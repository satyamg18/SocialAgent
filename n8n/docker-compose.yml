version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: social-media-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - ./data:/home/node/.n8n
      - ./workflows:/home/node/workflows
    environment:
      # General
      - N8N_LOG_LEVEL=info
      - N8N_DIAGNOSTICS_ENABLED=false
      - GENERIC_TIMEZONE=Asia/Kolkata

      # Webhook config — important for local dev
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
      - N8N_PORT=5678

      # Security — disable auth for local dev (enable in production)
      - N8N_BASIC_AUTH_ACTIVE=false

      # Allow importing workflows from filesystem
      - N8N_USER_FOLDER=/home/node
